spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/aviation
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000 

aws:
  s3:
    bucket: YOUR_BUCKET_NAME
    region: ap-southeast-2
  credentials:
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}